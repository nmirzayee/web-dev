<section class="page">
  <header class="header">
    <h1 class="title">Kaspi Product Catalog</h1>
    <p class="subtitle">Real product pages open on Kaspi in a new tab.</p>
  </header>

  <div class="grid">
    <article class="card" *ngFor="let p of products">
      <!-- Main image -->
      <div class="image-wrap">
        <img
          class="main-image"
          [src]="getSelectedImage(p)"
          [alt]="p.name"
          (click)="openModal(p)"
          loading="lazy"
        />

        <button class="open-btn" type="button" (click)="openModal(p)">
          View
        </button>
      </div>

      <!-- Thumbnails (Optional gallery implemented inline) -->
      <div class="thumbs" aria-label="Product images">
        <button
          class="thumb"
          type="button"
          *ngFor="let img of p.images; let i = index"
          (click)="selectImage(p, i)"
          [class.active]="(selectedIndex[p.id] ?? 0) === i"
          [title]="'Image ' + (i + 1)"
        >
          <img [src]="img" [alt]="p.name + ' thumbnail ' + (i + 1)" loading="lazy" />
        </button>
      </div>

      <div class="content">
        <div class="top-row">
          <h2 class="name">{{ p.name }}</h2>
          <span class="price">{{ formatPriceKZT(p.price) }}</span>
        </div>

        <p class="desc">{{ p.description }}</p>

        <div class="meta">
          <div class="rating" aria-label="Rating">
            <span class="stars" aria-hidden="true">
              <span
                class="star"
                *ngFor="let s of starArray()"
                [class.filled]="isStarFilled(p.rating, s)"
                >★</span
              >
            </span>
            <span class="rating-number">{{ p.rating.toFixed(1) }}</span>
          </div>

          <button class="link" type="button" (click)="openKaspi(p)">
            Open on Kaspi ↗
          </button>
        </div>

        <div class="actions">
          <button class="btn primary" type="button" (click)="shareWhatsApp(p)">
            Share (WhatsApp)
          </button>
          <button class="btn" type="button" (click)="shareTelegram(p)">
            Share (Telegram)
          </button>
        </div>
      </div>
    </article>
  </div>



  <!-- Modal Gallery -->
  <div
    class="modal-overlay"
    *ngIf="isModalOpen && modalProduct"
    (click)="onOverlayClick($event)"
  >
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">{{ modalProduct.name }}</div>
        <button class="icon-btn" type="button" (click)="closeModal()">✕</button>
      </div>

      <div class="modal-body">
        <button class="nav-btn" type="button" (click)="prevModal()" aria-label="Previous">
          ‹
        </button>

        <img
          class="modal-image"
          [src]="modalProduct.images[modalIndex]"
          [alt]="modalProduct.name"
        />

        <button class="nav-btn" type="button" (click)="nextModal()" aria-label="Next">
          ›
        </button>
      </div>

      <div class="modal-thumbs">
        <button
          class="thumb"
          type="button"
          *ngFor="let img of modalProduct.images; let i = index"
          (click)="modalIndex = i"
          [class.active]="modalIndex === i"
        >
          <img [src]="img" [alt]="modalProduct.name + ' thumb ' + (i + 1)" />
        </button>
      </div>

      <div class="modal-footer">
        <button class="btn" type="button" (click)="openKaspi(modalProduct)">
          Open on Kaspi ↗
        </button>
        <button class="btn primary" type="button" (click)="shareWhatsApp(modalProduct)">
          Share (WhatsApp)
        </button>
        <button class="btn" type="button" (click)="shareTelegram(modalProduct)">
          Share (Telegram)
        </button>
      </div>
    </div>
  </div>
  
</section>
